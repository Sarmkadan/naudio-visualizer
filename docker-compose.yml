version: '3.8'

services:
  naudio-visualizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naudio-visualizer
    image: naudio-visualizer:1.0.0
    stdin_open: true
    tty: true
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - LOG_LEVEL=Info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "test", "-f", "/app/naudio-visualizer.dll"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - naudio-visualizer-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  naudio-visualizer-network:
    driver: bridge

